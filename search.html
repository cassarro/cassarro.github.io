      "2017-01-20-agile-team-have-no-ego-html": {
        "title": "Agile Teams Have No Ego",
        "author": "Roderick Cassar",
        "category": "",
        "content": "Programmers are talented, smart, skilled professionals. We put in lots of our own effort to educate ourselves and stay up on current technologies. We work hard and we feel great satisfaction in our achievements. We donate our time to charities when the opportunity arises. We give back to our local communities. All things considered, there are a lot of really great programmers in the world.I lead a team of software developers. Does that mean I am the “best” programmer on the team? Certainly not. It just means that I lead the team. As the leader of the team, it is my job to: inspire, encourage, trail blaze, and motivate my team to be the best they can be. So who is the best programmer on my team? I don’t know, and I don’t care. There shouldn’t really be a “best” programmer on the team. Everyone on the team is great and working hard.A team that really meshes and works well together doesn’t let egos get in the way. It doesn’t matter if you’re a rock star developer. When you’re on the team, you’re part of the team. You might be the JavaScript expert, the master of SQL queries, or the guy who can refactor anything. When you’re part of the team, you should try to use your strength, but don’t let that interfere with the team’s flow.Sometimes it makes sense for a more experience developer to work with a less experienced developer. A common first instinct is that the senior person is mentoring the junior person, but it’s actually going both ways.Each of the two developers is bringing a lot to the table. Their different experiences and views allow them to each approach the problems differently, ask different questions, and apply different, existing knowledge.If either person’s ego gets in the way, it would prevent the 2-way knowledge transfer in addition to creating friction between them. One Developer and one Junior Developer can pair on a task and share knowledge. Does one act like the other one is just along for the ride? No.Your pair partner, is watching your back, guiding the team, and keeping the pair honest. Which one does that job? Both. If you had one person drive the whole time, you’re not going to see the benefits of pair programming.If you let your ego get in the way, you might not let the junior developer write any of the code. They may not know every library, every design pattern, or even the intricacies of the language they’re using, but those guys can write some great code.I don’t know how the Junior Developers are on your team, but ours write great code and show a high level of professionalism in their work.RichAndEricAnd sometimes you get a Junior Developer pairing with the Developer Intern. How the pairs split up doesn’t really matter. Who is working with whom doesn’t really matter. Each and every member of the team is bringing something to the table, and it is this interaction that is making the team as effective as it is. These two are as productive a team as any other pairing that we’ve got.Someone is probably reading this and thinking I am crazy for letting a Junior Developer and a Developer Intern pair together. They’re good though, and they really get great stuff done.We can accomplish a lot of stuff when our team works individually, however, we can accomplish a lot more as a group. You might be the “best developer” on your team, but if you keep thinking and acting that way, you’ll be missing out on a lot. I learn a lot when I pair with any member of my team. It doesn’t matter how much experience the person has. Everyone knows something I don’t, and no one approaches the problems exactly the same way I would.There is no “Ego” in “Agile Team”, so don’t bring yours to an agile team and expect good results.",
        "url": "/2017/01/20/agile-team-have-no-ego.html"
      }

      "2016-11-20-5-habits-of-great-engineering-managers-html": {
        "title": "The 5 Habits of Great Engineering Managers",
        "author": "Roderick Cassar",
        "category": "",
        "content": "What do managers do?Engineering management can be a very rewarding role. Its a role that has various aspects: technical leadership, project management, and last but not least, agile coaching. I believe that the main responsibility of a great software engineering manager is to build awesome teams. The latter constitutes an overall high level of technical competency together with great working chemistry between the team members, making the team solid. Awesome teams are fun, smart, and effective. They ship awesome software, making the company even more awesome.What are those five habits, which I’ve observed and learnt throughout my career so far, in awesome engineering managers? Adopting these habits could help you become an awesome engineering manager as well:1. They are positiveBeing positive and smiling is one of the easiest and cheapest life hacks for improving your team’s environment and well-being. Positivity is known to reduce stress and increase happiness.Perhaps what’s most amazing is that positivity doesn’t affect only your own stress level and happiness; it also has a positive impact on those around you. Positivity is most likely the easiest thing you can do to help create a positive, productive environment for your team. I always tell my teams to keep positive and should you see anything that can improve, think about ways of improving it an suggest, other than moan and complain.2. Tell your teams that they are awesome (appreciation)Every engineer deserves to feel that the team they are currently on is one of the best teams they’ve ever worked with. Awesome engineering managers ask their teams whether they think the team is awesome. If the manager doesn’t think it is true, and the team members don’t think it is true, there is some real work to do.thumbs up: engineering management habitsEngineers and engineering teams and individuals often lack the confidence to declare their awesomeness. It can be difficult for a team to become awesome unless someone first tells them they are. And since the engineering manager’s job is to build awesome teams, awesome engineering managers make sure to tell their teams just how good they are.The “fake it ’til you make it” approach is surprisingly effective. Awesome engineering managers are often their team’s biggest cheerleaders and first to make the declaration. They also try to be as specific as possible in giving their team details about things that are going well. Of course, it’s important that the team’s awesomeness doesn’t come at the expense of other teams in the company. Awesome engineering managers also point out the awesomeness of the entire engineering team—and the entire company.  Get to know the teamAwesome engineering managers know the importance of psychological safety in building effective teams. The term “psychological safety” was coined by Amy Edmondson, Novartis Professor of Leadership and Management at the Harvard Business School, and it’s worth taking a few minutes to watch her fascinating TEDx talk on the topic. Similarly, a recent Google blog post—The five keys to a successful Google team—focuses on the importance of psychological safety in empowering teams to be awesome.It turns out that taking time to learn about and express interest in the lives of each team member helps build genuine relationships, which can help to improve communication and psychological safety. That helps create the type of environment where everyone can do their best work.Put simply, teams with greater psychological safety are able to take risks without fear of ridicule. Psychological safety makes it safe for team members to ask questions, suggest alternatives, and challenge the status quo. This leads to greater creativity, productive conflicts, engagement, and results.4. Be thereProductivity guru W. Edwards Deming—who came up with the concept of Management By Walking Around—once wrote, “If you wait for people to come to you, you’ll only get small problems. You must go and find them. The big problems are where people don’t realize they have one in the first place.”Awesome engineering managers know the importance of spending time in the place where their teams work together and interact with each other. For co-located teams, this generally means sitting with the team. For remote teams this might include online environments such as GitHub, Slack, HipChat, IRC, or Google Hangouts.Your team won’t always tell you when things are going well and they won’t always bring problems to your attention. Being present and spending time with them will allow you to make direct, firsthand observations about the team’s health, productivity, and morale. You will be closer to the work, and you’ll be much more in tune with the health of your team.5. Don’t impose, yet always empowerIn his classic book Turn the Ship Around: A True Story of Turning Followers Into Leaders, author David Marquet asks: “What happens in a top-down culture when the leader is wrong? Everyone goes over the cliff.” After Marquet, a submarine captain in the U.S. Navy, observed the near tragic consequences of his team blindly following an impossible order, he “vowed henceforth never to give an order, any order.” Marquet implemented a leadership system designed to empower teams and create new leaders rather than give orders to his crew, and he produced remarkable results.Similarly, in his book Drive: The Surprising Truth About What Motivates Us, best-selling author Daniel Pink cites Autonomy, Mastery, and Purpose as “the motivation trifecta.” Pink reviews psychology studies that show, contrary to expectations, money is a poor motivator for complex cognitive tasks. Instead, self-direction (autonomy), continuous improvement of a skill (mastery), and the feeling of contribution to a greater purpose produced the greatest results.Awesome engineering managers make every effort to delegate authority to their teams. In my experience, teams almost always make better decisions than do individuals. By delegating the decision-making, awesome engineering managers help make their teams more engaged and more effective—more awesome!",
        "url": "/2016/11/20/5-habits-of-great-engineering-managers.html"
      }
      ,
