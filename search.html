      "2017-03-04-build-great-software-and-teams-html": {
        "title": "Building Software and Teams",
        "author": "Roderick Cassar",
        "category": "",
        "content": "An Innovative and Collaborative Culture.Software developers spend a lot of time and energy planning on how to build the best possible products. We get carried away over which web framework to use or whether to use a NoSQL or SQL database. Such questions are important, yet they often neglect to address an important aspect of software development - culture. A strong innovative and collaborative culture.Business products constantly change and evolve. It can happen that in the next few years, a product that you’ve poured your blood, sweat, and tears into may not exist anymore. However, if you’ve also focused on creating a strong team and coding culture, you will always be poised to take advantage of opportunities (and overcome obstacles) that come your way. Furthermore, developing a strong culture requires a shared understanding of what your team stands for and this cohesion will be reflected positively in the products that your team builds.  Great culture contributes to great products.So what defines a “great culture”?Our office environment is ultimately not our working environment. We can have access to fitness classes, yoga, beer Fridays and more, but these do not equate to how we talk, work, organize, win, and lose together. This is what makes a great working culture. It is that which leads to happier, more productive employees. All the free food and office perks in the world are useless if people feel afraid of failure, trapped in a rigid hierarchy, or that their employer values profits over people.Our workplace today is no longer dominated by a 9-to-5, clock-in clock-out, production-line assembly mentality. For knowledge workers, like software developers, output isn’t valued by volume or hours, but by creativity and quality. We have now the freedom to work in the office, at home or in a hotel room whenever we want. This creates infinitely exciting opportunities to cultivate a culture that benefits every employee. This obvisouly assumes employees are responsible and mature.Developing a strong culture requires a shared understanding of what your team stands for and this cohesion will be reflected positively in the products that your team builds. A weight of research has emerged that proves something we already intuitively know:  happy employees are productive employees and generally enable more profitable, faster-growing companies.Everyone should always be aware of the customer. Customer awareness also helps teams stay passionate about their products. To sustain team work, one must beware of prima donnas in the team, who may over shoot the goal or do things that aren’t good for the entire team or the product.Team SizeWe shoot for small teams with an average of four to seven people.  However, as companies get bigger and bigger, these teams and departments tend to get divided into silos that can be difficult to breach. There are inter-departmental chat rooms in addition to chats for each team that allows people from different parts of the organization to connect. We know that our culture will change as we grow even larger, but we also know that our values will help keep our culture intact if we do the right thing and hold people accountable living them. We scale culture by creating small development teams that also include designers and QA people and that are cross-functional, so if we don’t need a designer for the next sprint, he or she can go to another team that needs them, and vice versa.Another challenge is organizing multiple teams that work on one product. I’ve seen companies address this by creating a front-end team, performance team, database team, etc.  I found that giving each team responsibility for a specific area works much better.  Picking the Right People is one of the greatest efforts to cultivate a culture so it will not fall short.Thus, always hire people that are a good fit for your company and each team. Its better to wait longer to hire, than to hire people who won’t fit well within the team.",
        "url": "/2017/03/04/build-great-software-and-teams.html"
      }
      ,
    
      "2017-01-20-agile-team-have-no-ego-html": {
        "title": "Agile Teams Have No Ego",
        "author": "Roderick Cassar",
        "category": "",
        "content": "Software DevelopersSoftware developers are talented, smart, skilled professionals. We put in lots of our own effort to educate ourselves and stay up to speed on latest technologies. We work hard and we feel great satisfaction in our achievements. All things considered, there are a lot of really great programmers out there.Agile software development with Scrum is often perceived as a methodology but rather than viewing Scrum as methodology, think it as a framework for managing a process. Scrum relies on a self-organizing, cross-functional team. Thus, the team supersedes the individual, yet keeping in mind that a number of individuals make up a team.There is no ‘best’ individualI lead a number of teams of software developers. Does that mean I am the “best” programmer within the team? Certainly not. It just means that I lead the teams. As the leader of the teams, it is my job to: inspire, encourage, trail blaze, and motivate my teams to be the best they can be. So is there a best programmer in a team? Most probably there is, but then its up to the individual’s ego and attitude to either help others become as good or become the prima donna of the team. There shouldn’t be a “best” programmer on the team. Everyone on the team is great and working hard. That said, hard work and efforts must be noticed and such feedback should be given.That said, any team members who are under performing within a team, should have the humility to ask for help. It is all about the attitude. When someone shows the effort to improve, by for instance taking a course in his private time to get up to speed on a technology, would need the support of his or her team. If team members work as a team, pulling the same string towards the same direction, the results acheived are immense.Then again, if one’s ego would be to bad mouth such an under performing individual other than giving a helping hand, then the team starts to get flaky. One must understand the big difference between constructive feedback and destructive feedback. Which ever type of feedback one chooses would show the ego one has or has not.A team that really meshes and works well together doesn’t let egos get in the way. It doesn’t matter if you’re a rock star developer. When you’re on the team, you’re part of the team. You might be the JavaScript expert, the master of SQL queries, or the guy who can refactor anything. When you’re part of the team, you should try to use your strength, but don’t let that interfere with the team’s flow.  Coming together is a beginning; keeping together is progress; working together is success - Henry FordPair ProgrammingSometimes it makes sense for a more experience developer to work with a less experienced developer. A common first instinct is that the senior person is mentoring the junior person, but it’s actually going both ways. Each of the two developers is bringing a lot to the table. Their different experiences and views allow them to each approach the problems differently, ask different questions, and apply different, existing knowledge.If either person’s ego gets in the way, it would prevent the 2-way knowledge transfer in addition to creating friction between them. One Developer and one Junior Developer can pair on a task and share knowledge. Does one act like the other one is just along for the ride? No.Your pair buddy, is watching your back, guiding the team, and keeping the pair honest. Which one does that job? Both. If you had one person drive the whole time, you’re not going to see the benefits of pair programming. If you let your ego get in the way, you might not let the junior developer write any of the code. They may not know every library, every design pattern, or even the intricacies of the language they’re using, but those guys can write some great code.How the pairs split up doesn’t really matter. Who is working with whom doesn’t really matter. Each and every member of the team is bringing something to the table, and it is this interaction that is making the team as effective as it is.Team vs IndividualWe can accomplish a lot of stuff when our team works individually, however, we can accomplish a lot more as a team. You might be the “best developer” on your team, but if you keep thinking and acting that way, you’ll be missing out on a lot. I learn a lot when I pair with any member of my team. It doesn’t matter how much experience the person has. Everyone knows something I don’t, and no one approaches the problems exactly the same way I would.  There is no “Ego” in “Agile Team”, so don’t bring yours to an agile team and expect good results.",
        "url": "/2017/01/20/agile-team-have-no-ego.html"
      }
      ,
    
      "2016-12-23-introduction-to-heroku-html": {
        "title": "Introduction to Heroku",
        "author": "Roderick Cassar",
        "category": "",
        "content": "What is Heroku?I’ve been using heroku for development in the last few months. Heroku basically provides a higher level of abstraction on top of cloud (Amazon EC2) instances. They take care of all aspects of your “platform” (thus its a PaaS) so you simply deploy your application by pushing commits to your heroku git repository. Yes! One can actually manage the code deployments on Heroku through GIT - more info can be found here.Advantages of using HerokuHeroku is extremely easy to start, which is a great advantage: you don’t need to deal with the infrastructure. For startups that don’t want to spend time and money on setting up their configurations it’s fantastic - a true time saver. Another advantage is that there is that scaling is straightforward - just specify the number of processing units (dynos) you need and you’re set. Another advantage, is that you’re using standard tools to build your application so there’s no lock-in when you decide to migrate to another service.Disadvantages of using HerokuAs for disadvantages - the abstraction comes on expense of control. With Heroku you cannot control the exact configuration of your application, in terms of hardware, OS, firewall, versions etc. You have to use their standards.Another disadvantage might also be, that for high volume applications, one might review the benefits vs costs in comparison to other options.Heroku is not really meant for use by a big organization – the target market is the individual Ruby developer who may not have the bandwidth to either be the system admin himself or hire an external system admin. This is evident, in various aspects of the platform including its documentation, which is not too bulky. However, there are big corporations who use Heroku for their development needs as well.Should you use Heroku?Ultimately, the use of Heroku depends on the development philosophy – if you are willing to sacrifice control over the application configuration and deployment, so that you can develop that much faster, then you would definitely love Heroku. You can completely forget about servers, run virtually anything on the platform and even scale up easily when you opt for Heroku.",
        "url": "/2016/12/23/introduction-to-heroku.html"
      }
      ,
    
      "2016-11-20-5-habits-of-great-engineering-managers-html": {
        "title": "5 Skills of Great Engineering Managers",
        "author": "Roderick Cassar",
        "category": "",
        "content": "What do managers do?Engineering management can be a very rewarding role. Its a role that has various aspects: technical leadership, project management, and last but not least, agile coaching. I believe that the main responsibility of a great software engineering manager is to build great teams. The latter constitutes an overall high level of technical competency together with great working chemistry between the team members, making the team solid. Awesome teams are fun, smart, and effective. They ship awesome software, making the company even more awesome.What are those five skills in good engineering managers, which I’ve observed and learnt throughout my career so far?1. They are positiveBeing positive and putting a smile is one of the easiest and cheapest life hacks for improving your team’s environment and well-being. Positivity is known to reduce stress and increase happiness.Perhaps what’s most amazing is that positivity doesn’t affect only your own stress level and happiness; it also has a positive impact on those around you. Positivity is most likely the easiest thing you can do to help create a positive, productive environment for your team. I always tell my teams to keep positive and should you see anything that can improve, think about ways of improving it and suggest, other than moan and complain. It is very easy to complain about something as opposed to thinking of how to improve it.2. Tell your teams that they are awesome (appreciation)Every engineer deserves to feel that the team they are currently with is one of the best teams they’ve ever worked with. Great engineering managers ask their teams whether they think the team is awesome. If the manager doesn’t think it is true, and the team members don’t think it is true, there is some real work to do.Engineers and engineering teams and individuals often lack the confidence to declare their awesomeness. It can be difficult for a team to become great unless someone first tells them they are. And since the engineering manager’s job is to build awesome teams, awesome engineering managers make sure to tell their teams just how good they are. Of course, it’s important that the team’s awesomeness doesn’t come at the expense of other teams (or individuals) in the company.3. Get to know the teamGreat engineering managers know the importance of psychological safety in building effective teams. The term “psychological safety” was coined by Amy Edmondson, Professor of Leadership and Management at the Harvard Business School.It turns out that taking time to learn about and express interest in the lives of each team member helps build genuine relationships, which can help to improve communication and psychological safety. That helps create the type of environment where everyone can do their best work.Put simply, teams with greater psychological safety are able to take risks without fear of ridicule. Psychological safety makes it safe for team members to ask questions, suggest alternatives, and challenge the status quo. This leads to greater creativity, productive conflicts, engagement, and results.4. Be thereGreat engineering managers know the importance of spending time in the place where their teams work together and interact with each other. For co-located teams, this generally means sitting with the team. For remote teams this might include online environments such as GitHub, Slack, HipChat, Skype, or Google Hangouts.Your team won’t always tell you when things are going well and they won’t always bring problems to your attention. Being present and spending time with them will allow you to make direct, firsthand observations about the team’s health, productivity, and morale. You will be closer to the work, and you’ll be much more in tune with the health of your team.5. Don’t impose, yet always empowerGreat engineering managers make every effort to delegate authority to their teams. In my experience, teams almost always make better decisions than do individuals. By delegating the decision-making, awesome engineering managers help make their teams more engaged and more effective—more awesome!",
        "url": "/2016/11/20/5-habits-of-great-engineering-managers.html"
      }
      
    
  };
